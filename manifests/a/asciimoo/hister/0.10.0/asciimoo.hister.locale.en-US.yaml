License: AGPL-3.0
LicenseUrl: https://github.com/asciimoo/hister/blob/master/LICENSE
ShortDescription: Your own search engine – Full-text search across your files, visited sites and beyond.
Description: |-
  Hister is a versatile, privacy-focused web search engine designed to index the full content of visited web pages locally. Unlike traditional search engines, it allows you to find specific information within your own browsing history using full-text indexing.
ReleaseNotes: |-
  What's Changed
  - Include parent directory in local file titles.
  - Add POST /api/batch endpoint for bulk add/delete/get operations.
  - Add custom headers support to browser extension.
  - Add light mode and theme switcher to browser extension.
  - Switch to mode-watcher for theme management.
  - Fix Svelte 5 proxy being stored in Chrome storage for customHeaders.
  - Strip debug symbols from release binary.
  - Fix include full end date in date range search.
ReleaseNotesUrl: https://github.com/asciimoo/hister/releases/tag/v0.10.0

Author: Adam Tauber
PackageName: Hister
PackageUrl: https://github.com/asciimoo/hister
License: AGPL-3.0
LicenseUrl: https://github.com/asciimoo/hister/blob/master/LICENSE
ShortDescription: Your own search engine – Full-text search across your files, visited sites and beyond.
Description: |-
  Hister is a versatile, privacy-focused web search engine designed to index the full content of visited web pages locally. Unlike traditional search engines, it allows you to find specific information within your own browsing history using full-text indexing.
ReleaseNotes: |-
  What's Changed
  - Add local file indexing support.
  - Fix all golangci-lint errcheck and unused warnings.
  - Add Dependabot support.
  - Make extension use same design as app and website.
  - Fix Docker publish workflow and Dockerfile.
  - Improve list-urls performances and fix missing entries.
  - Add PR lint workflow for Go, NPM format, and no merge commits.
  - Update to Vite 8.0.0 and use Rolldown.
  - Fix patch workspace shebangs in Nix frontend derivation.
  - Add CI build for hister, @hister/website and @hister/ext for PRs.
  - Add ability to index and view local files.
  - Update docs on how local indexing works.
ReleaseNotesUrl: https://github.com/asciimoo/hister/releases/tag/v0.9.0
Documentations:
- DocumentLabel: Documentation
  DocumentUrl: https://hister.org/docs
